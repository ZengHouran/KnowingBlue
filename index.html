<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowingBlue</title>
    <meta name="description" content="KnowingBlue - 专注于感性与认知心理相关的创意工作室，以感性、品味、触达为核心理念。" />
    <meta name="author" content="KnowingBlue" />
    <meta property="og:image" content="./og-image.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'serif': ['Georgia', 'serif'],
                    },
                    colors: {
                        'muted-foreground': '#6b7280',
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.7s ease-out, transform 0.7s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .hero-bg {
            background-image: url('./public/pictures/origin5f51e91125495953b87f3f30.jpg');
            background-size: cover;
            background-position: center;
        }
        
        /* Japanese Minimalist Style - Restrained Blue Theme */
        .blue-mist {
            background: linear-gradient(135deg, 
                rgba(59, 130, 246, 0.03) 0%, 
                rgba(37, 99, 235, 0.08) 25%,
                rgba(59, 130, 246, 0.05) 50%,
                rgba(37, 99, 235, 0.02) 75%,
                rgba(59, 130, 246, 0.04) 100%);
        }
        
        .blue-glow {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.15),
                        0 0 100px rgba(37, 99, 235, 0.1),
                        inset 0 0 60px rgba(59, 130, 246, 0.05);
        }
        
        .text-gradient-blue {
            background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 50%, #1e40af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .border-blue-subtle {
            border-color: rgba(59, 130, 246, 0.2);
        }
        
        /* Restrained hover effects */
        .hover-blue-mist:hover {
            background: rgba(59, 130, 246, 0.08);
            transition: background 0.3s ease;
        }
        
        /* Japanese aesthetic - subtle animations */
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-3px); }
        }
        
        .gentle-float {
            animation: gentle-float 6s ease-in-out infinite;
        }
        
        /* Minimalist separator */
        .jp-separator {
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(59, 130, 246, 0.3) 50%, 
                transparent 100%);
        }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased blue-mist">
    <!-- Header -->
    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 py-5 bg-transparent">
        <div class="container mx-auto px-4 md:px-6 flex items-center justify-between">
            <a href="#home" class="text-xl font-serif font-medium tracking-tight text-gray-900 hover:text-blue-600 transition-colors">
                KnowingBlue
            </a>
            
            <!-- Desktop Navigation -->
            <nav class="hidden md:flex items-center space-x-8">
                <a href="#home" class="text-sm text-gray-900 hover:text-blue-600 transition-colors" data-nav="home">首页</a>
                <a href="vision.html" class="text-sm text-gray-900 hover:text-blue-600 transition-colors" data-nav="vision">愿景</a>
                
                <!-- Language Switcher -->
                <div class="relative">
                    <button id="lang-switcher" class="text-sm text-gray-900 hover:text-blue-600 transition-colors flex items-center space-x-1">
                        <span id="current-lang">中文</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="lang-menu" class="hidden absolute top-full right-0 mt-2 bg-white rounded-lg shadow-lg border border-blue-200/30 py-2 min-w-[100px] blue-glow">
                        <button class="lang-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover-blue-mist" data-lang="zh">中文</button>
                        <button class="lang-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover-blue-mist" data-lang="en">English</button>
                        <button class="lang-option block w-full text-left px-4 py-2 text-sm text-gray-700 hover-blue-mist" data-lang="ja">日本語</button>
                    </div>
                </div>
            </nav>
            
            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-900">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white/95 backdrop-blur-md border-t border-blue-200/20">
            <nav class="container mx-auto px-4 py-4 space-y-2">
                <a href="#home" class="block text-sm text-gray-900 hover:text-blue-600 transition-colors" data-nav="home">首页</a>
                <a href="vision.html" class="block text-sm text-gray-900 hover:text-blue-600 transition-colors" data-nav="vision">愿景</a>
                
                <!-- Mobile Language Switcher -->
                <div class="border-t border-blue-200/20 pt-2 mt-2">
                    <div class="text-xs text-gray-500 mb-2">语言 / Language</div>
                    <div class="flex space-x-2">
                        <button class="lang-option-mobile px-3 py-1 text-xs bg-blue-50 hover:bg-blue-100 transition-colors" data-lang="zh">中文</button>
                        <button class="lang-option-mobile px-3 py-1 text-xs bg-blue-50 hover:bg-blue-100 transition-colors" data-lang="en">EN</button>
                        <button class="lang-option-mobile px-3 py-1 text-xs bg-blue-50 hover:bg-blue-100 transition-colors" data-lang="ja">日本語</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="relative">
        <!-- Hero Section -->
        <section id="home" class="relative min-h-screen flex items-center overflow-hidden hero-bg">
            <div class="absolute inset-0 bg-gradient-to-b from-white/90 via-blue-50/70 to-white/95"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-blue-100/30 via-transparent to-blue-100/30"></div>
            
            <!-- Subtle decorative elements -->
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-200/15 rounded-full blur-3xl gentle-float"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-300/15 rounded-full blur-3xl gentle-float" style="animation-delay: 2s;"></div>
            
            <div class="container mx-auto px-4 md:px-6 py-20 md:py-32 relative z-10 max-w-4xl">
                <div class="max-w-3xl mx-auto text-center">
                    <div class="fade-in" data-delay="200">
                        <h1 class="text-4xl md:text-5xl lg:text-6xl font-serif font-medium tracking-tight text-gray-900 leading-tight mb-6 text-gradient-blue pb-2">
                            KnowingBlue
                        </h1>
                    </div>
                    
                    <div class="fade-in" data-delay="300">
                        <p class="text-lg md:text-xl text-gray-800 mb-4" data-text="hero-subtitle">
                            感性驱动认知，品味塑造体验。
                        </p>
                        <p class="text-lg md:text-xl text-gray-800 mb-8" data-text="hero-description">
                            我们专注于感性与认知心理的创意探索，用设计触达内心深处。
                        </p>
                    </div>
                    
                    <div class="jp-separator w-full max-w-md mx-auto my-8"></div>
                    
                    <div class="fade-in" data-delay="400">
                        <p class="text-sm text-gray-600 mt-8" data-text="copyright">
                            © 2026 KnowingBlue. 保留所有权利。
                        </p>
                    </div>
                </div>
            </div>
        </section>




    </main>

    <!-- Audio Player - Minimal Design -->
    <div id="audio-player" class="fixed bottom-6 right-6 z-50 transition-all duration-300 opacity-40 hover:opacity-100">
        <button id="play-pause-btn" class="w-12 h-12 bg-white/80 backdrop-blur-sm border border-blue-200/30 rounded-full flex items-center justify-center hover:bg-white hover-blue-mist transition-all duration-300 blue-glow">
            <svg id="play-icon" class="w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
            </svg>
            <svg id="pause-icon" class="w-5 h-5 text-gray-700 hidden" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
        </button>
        <div id="progress-ring" class="absolute inset-0 w-12 h-12 pointer-events-none">
            <svg class="w-12 h-12 transform -rotate-90" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1" fill="none" class="text-blue-200"/>
                <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" fill="none" 
                        class="text-blue-500 transition-all duration-300" 
                        stroke-dasharray="125.6" stroke-dashoffset="125.6" id="progress-circle"/>
            </svg>
        </div>
    </div>

    <audio id="background-audio" loop>
        <source src="./public/music/Featherfall.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    const headerHeight = 80;
                    const targetPosition = targetElement.offsetTop - headerHeight;
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Header scroll effect
        window.addEventListener('scroll', function() {
            const header = document.getElementById('header');
            const langSwitcher = document.getElementById('lang-switcher');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            
            if (window.scrollY > 10) {
                header.classList.remove('py-5', 'bg-transparent');
                header.classList.add('py-3', 'bg-white/95', 'backdrop-blur-md', 'border-b', 'border-blue-200/20', 'shadow-sm');
                // Keep text color consistent for scrolled state
                header.querySelectorAll('a').forEach(link => {
                    link.classList.remove('text-white', 'hover:text-gray-200');
                    link.classList.add('text-gray-900', 'hover:text-blue-600');
                });
                // Keep language switcher color consistent
                if (langSwitcher) {
                    langSwitcher.classList.remove('text-white', 'hover:text-gray-200');
                    langSwitcher.classList.add('text-gray-900', 'hover:text-blue-600');
                }
                // Keep mobile menu button color consistent
                if (mobileMenuBtn) {
                    mobileMenuBtn.classList.remove('text-white');
                    mobileMenuBtn.classList.add('text-gray-900');
                }
            } else {
                header.classList.remove('py-3', 'bg-white/95', 'backdrop-blur-md', 'border-b', 'border-blue-200/20', 'shadow-sm');
                header.classList.add('py-5', 'bg-transparent');
                // Keep text color consistent for transparent state
                header.querySelectorAll('a').forEach(link => {
                    link.classList.remove('text-gray-900', 'hover:text-blue-600');
                    link.classList.add('text-gray-900', 'hover:text-blue-600');
                });
                // Keep language switcher color consistent
                if (langSwitcher) {
                    langSwitcher.classList.remove('text-gray-900', 'hover:text-blue-600');
                    langSwitcher.classList.add('text-gray-900', 'hover:text-blue-600');
                }
                // Keep mobile menu button color consistent
                if (mobileMenuBtn) {
                    mobileMenuBtn.classList.remove('text-gray-900');
                    mobileMenuBtn.classList.add('text-gray-900');
                }
            }
        });

        // Mobile menu toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.classList.toggle('hidden');
        });

        // Fade in animation on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const delay = entry.target.getAttribute('data-delay') || 0;
                    setTimeout(() => {
                        entry.target.classList.add('visible');
                    }, delay);
                }
            });
        }, observerOptions);

        // Observe all fade-in elements
        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });

        // Language switching functionality
        const translations = {
            zh: {
                // Navigation
                'home': '首页',
                'vision': '愿景',
                
                // Hero Section
                'hero-subtitle': '感性驱动认知，品味塑造体验。',
                'hero-description': '我们专注于感性与认知心理的创意探索，用设计触达内心深处。',
                

                

                
                // Footer
                'copyright': '© 2026 KnowingBlue. 保留所有权利。'
            },
            en: {
                // Navigation
                'home': 'Home',
                'vision': 'Vision',
                
                // Hero Section
                'hero-subtitle': 'Emotion drives cognition, taste shapes experience.',
                'hero-description': 'We focus on creative exploration of emotion and cognitive psychology, using design to reach the depths of the heart.',
                

                

                
                // Footer
                'copyright': '© 2026 KnowingBlue. All rights reserved.'
            },
            ja: {
                // Navigation
                'home': 'ホーム',
                'vision': 'ビジョン',
                
                // Hero Section
                'hero-subtitle': '感性が認知を駆動し、品味が体験を形作る。',
                'hero-description': '私たちは感性と認知心理学の創造的探求に焦点を当て、デザインで心の奥深くに触れることを目指しています。',
                

                
                // Footer
                'copyright': '© 2026 KnowingBlue. 全著作権所有。'
            }
        };

        // Current language
        let currentLang = localStorage.getItem('language') || 'zh';

        // Language switching function
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            
            // Update current language display
            const langNames = { zh: '中文', en: 'English', ja: '日本語' };
            document.getElementById('current-lang').textContent = langNames[lang];
            
            // Update all text elements
            document.querySelectorAll('[data-text]').forEach(element => {
                const key = element.getAttribute('data-text');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
            
            // Update navigation elements
            document.querySelectorAll('[data-nav]').forEach(element => {
                const key = element.getAttribute('data-nav');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
            
            // Update page title and meta description
            if (lang === 'zh') {
                document.title = 'KnowingBlue - 感性设计工作室';
                document.querySelector('meta[name="description"]').content = 'KnowingBlue - 专注于感性与认知心理相关的创意工作室，以感性、品味、触达为核心理念。';
            } else if (lang === 'en') {
                document.title = 'KnowingBlue - Emotional Design Studio';
                document.querySelector('meta[name="description"]').content = 'KnowingBlue - A creative studio focused on emotion and cognitive psychology, with sensibility, taste, and connection as core concepts.';
            } else if (lang === 'ja') {
                document.title = 'KnowingBlue - 感性デザインスタジオ';
                document.querySelector('meta[name="description"]').content = 'KnowingBlue - 感性と認知心理学に特化したクリエイティブスタジオ、感性、品味、触達を核心理念とする。';
            }
        }

        // Language switcher event listeners
        document.getElementById('lang-switcher').addEventListener('click', function() {
            document.getElementById('lang-menu').classList.toggle('hidden');
        });

        // Desktop language options
        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', function() {
                const lang = this.getAttribute('data-lang');
                switchLanguage(lang);
                document.getElementById('lang-menu').classList.add('hidden');
            });
        });

        // Mobile language options
        document.querySelectorAll('.lang-option-mobile').forEach(option => {
            option.addEventListener('click', function() {
                const lang = this.getAttribute('data-lang');
                switchLanguage(lang);
                document.getElementById('mobile-menu').classList.add('hidden');
            });
        });

        // Close language menu when clicking outside
        document.addEventListener('click', function(event) {
            const langSwitcher = document.getElementById('lang-switcher');
            const langMenu = document.getElementById('lang-menu');
            if (!langSwitcher.contains(event.target)) {
                langMenu.classList.add('hidden');
            }
        });

        // Initialize language on page load
        switchLanguage(currentLang);
        // Audio Player Controls
        const audio = document.getElementById('background-audio');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');


        let isPlaying = false;

        // Save audio state before page unload
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('audioState', JSON.stringify({
                currentTime: audio.currentTime,
                isPlaying: !audio.paused,
                volume: audio.volume,
                muted: audio.muted
            }));
        });

        // Format time in MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Update progress circle
        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration);
                const circumference = 2 * Math.PI * 20; // radius = 20
                const offset = circumference - (progress * circumference);
                document.getElementById('progress-circle').style.strokeDashoffset = offset;
            }
        }

        // Play/Pause toggle
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            } else {
                audio.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            }
            isPlaying = !isPlaying;
        });



        // Audio event listeners

        audio.addEventListener('timeupdate', updateProgress);

        audio.addEventListener('ended', () => {
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
        });

        // Restore audio state on page load
        const savedState = localStorage.getItem('audioState');
        let hasAttemptedPlay = false;
        
        // Function to attempt autoplay
        function attemptAutoplay() {
            if (hasAttemptedPlay) return;
            hasAttemptedPlay = true;
            
            audio.play().then(() => {
                isPlaying = true;
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            }).catch(e => {
                console.log('Autoplay prevented:', e);
                // If autoplay fails, set up interaction-based play
                setupInteractionPlay();
            });
        }

        // Function to setup interaction-based play
        function setupInteractionPlay() {
            const playOnInteraction = () => {
                if (hasAttemptedPlay && !isPlaying) {
                    audio.play().then(() => {
                        isPlaying = true;
                        playIcon.classList.add('hidden');
                        pauseIcon.classList.remove('hidden');
                        // Remove event listeners after successful play
                        document.removeEventListener('click', playOnInteraction);
                        document.removeEventListener('scroll', playOnInteraction);
                        document.removeEventListener('mousemove', playOnInteraction);
                        document.removeEventListener('touchstart', playOnInteraction);
                        document.removeEventListener('keydown', playOnInteraction);
                    }).catch(e => console.log('Interaction play failed:', e));
                }
            };

            // Add multiple interaction events to trigger play
            document.addEventListener('click', playOnInteraction);
            document.addEventListener('scroll', playOnInteraction);
            document.addEventListener('mousemove', playOnInteraction, { once: true });
            document.addEventListener('touchstart', playOnInteraction, { once: true });
            document.addEventListener('keydown', playOnInteraction, { once: true });
        }

        if (savedState) {
            const state = JSON.parse(savedState);
            audio.currentTime = state.currentTime || 0;
            audio.volume = state.volume || 1;
            audio.muted = state.muted || false;
            
            // Always try to resume playing from saved state
            attemptAutoplay();
            
            // Clear the saved state after restoration
            localStorage.removeItem('audioState');
        } else {
            // Try autoplay on fresh page load
            attemptAutoplay();
        }

        // Hide audio player on mobile after 3 seconds
        let playerTimeout;
        const audioPlayer = document.getElementById('audio-player');
        
        function hidePlayerOnMobile() {
            if (window.innerWidth < 768) {
                playerTimeout = setTimeout(() => {
                    audioPlayer.style.transform = 'translateX(100%)';
                    audioPlayer.style.opacity = '0.3';
                }, 3000);
            }
        }

        audioPlayer.addEventListener('mouseenter', () => {
            clearTimeout(playerTimeout);
            audioPlayer.style.transform = 'translateX(0)';
            audioPlayer.style.opacity = '1';
        });

        audioPlayer.addEventListener('mouseleave', hidePlayerOnMobile);
        
        // Initial setup
        hidePlayerOnMobile();
    </script>
</body>
</html>
